version: 2

project_name: kauket

builds:
  - id: kauket
    main: ./cmd/kauket
    binary: kauket
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gonzaloalvarez/kauket/internal/buildflags.Version={{.Version}}
      - -X github.com/gonzaloalvarez/kauket/internal/buildflags.Commit={{.Commit}}
      - -X github.com/gonzaloalvarez/kauket/internal/buildflags.Date={{.Date}}

archives:
  - id: kauket
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: '{{ .Tag }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'

release:
  github:
    owner: GonzaloAlvarez
    name: kauket
  prerelease: auto
  mode: replace
